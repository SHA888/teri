[advisories]
# Ignore these advisories for now - they are dependencies of our dependencies
# and we can't easily replace them without major refactoring
ignore = [
    "RUSTSEC-2025-0052", # async-std discontinued (dependency of httpmock)
    "RUSTSEC-2025-0141", # bincode unmaintained
    "RUSTSEC-2025-0057", # fxhash unmaintained (dependency of scraper)
]

[bans]
# Allow duplicate versions for these crates as they come from different dependency trees
multiple-versions = "allow"
skip = [
    # These duplicates are from different dependency trees and are acceptable
    { name = "siphasher" },
    { name = "tower" },
    { name = "tower-http" },
]

[licenses]
# We're using MIT license
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "Unicode-DFS-2016", "Unicode-3.0", "MPL-2.0", "ISC"]
confidence-threshold = 0.8
